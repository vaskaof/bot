<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Кнопка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    body {
      background-color: #f3f4f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #9ca3af;
      font-size: 14px;
      text-align: center;
      padding: 0 24px;
    }
  </style>
</head>

<body>
  <div id="entry-status">Загрузка...</div>

  <script>
    // Единственная точка входа Mini App. Определяет роль через getUserContext
    // и уводит на нужную панель — сама ничего не рендерит, кроме статуса.
    (async function () {
      try {
        const context = await fetchUserContext();
        if (context.role === 'admin') {
          window.location.replace('admin/index.html');
        } else {
          window.location.replace('client/orders.html');
        }
      } catch (error) {
        document.getElementById('entry-status').textContent =
          'Не удалось определить доступ. Откройте панель через кнопку в чате бота ещё раз.';
        console.error('Ошибка getUserContext:', error);
      }
    })();
  </script>
</body>

</html>
