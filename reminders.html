<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Напоминания</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    body {
      background-color: #f3f4f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 80px;
    }
  </style>
</head>

<body class="text-gray-800">
  <div id="loading-screen" class="fixed inset-0 bg-[#f3f4f9] flex items-center justify-center z-50">
    <div class="text-gray-400 text-sm">Загрузка...</div>
  </div>

  <div id="access-denied-screen" class="fixed inset-0 bg-[#f3f4f9] hidden items-center justify-center z-50 px-6">
    <div class="text-center" style="font-family: monospace; font-size: 12px; word-break: break-all; text-align: left;">
      <p><b>Доступ не подтверждён.</b></p>
      <p id="debug-tg-exists"></p>
      <p id="debug-init-data"></p>
    </div>
  </div>

  <div id="app-content" class="hidden">
    <header class="fixed top-0 left-0 right-0 h-14 bg-[#f3f4f9] bg-opacity-90 backdrop-blur-md z-40 flex items-center justify-between px-4">
      <a href="index.html" class="p-2 text-indigo-600 rounded-full hover:bg-white/50 transition-colors">
        <i data-lucide="arrow-left" class="w-6 h-6"></i>
      </a>
      <h1 class="text-lg font-semibold text-gray-900 tracking-tight">Напоминания</h1>
      <button id="refresh-reminders" class="p-2 text-indigo-600 rounded-full hover:bg-white/50 transition-colors">
        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
      </button>
    </header>

    <main class="pt-16 pb-6 px-4 md:px-0 max-w-2xl mx-auto">

      <!-- Блок рекомендаций по индивидуальной отправке -->
      <div id="recommendations-block" class="hidden mb-4"></div>

      <div class="text-[11px] text-gray-400 px-1 mb-2" id="reminders-count"></div>

      <div id="reminders-list"></div>
      <div id="empty-message" class="hidden text-center text-sm text-gray-400 py-10">Незаполненных полей нет 🎉</div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 pb-safe pt-1 px-1 flex justify-between items-end z-40 h-[70px] shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
      <a href="index.html" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="home" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Главная</span>
      </a>
      <a href="orders.html" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="list" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Заказы</span>
      </a>
      <a href="catalog.html" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="layers" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Каталог</span>
      </a>
      <a href="reminders.html" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-indigo-600 pb-2 h-full">
        <i data-lucide="bell" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Напоминания</span>
      </a>
      <a href="#" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="user-circle" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Профиль</span>
      </a>
    </nav>
  </div>

  <script>
    lucide.createIcons();
    initAccessCheck(initApp);

    // Подписи условий — только для отображения, бизнес-логика целиком на сервере
    const CONDITION_LABELS = {
      1: 'Валюта и курсы',
      2: 'Оплаты',
      3: 'Вес и доставка КЗ→РФ',
      4: 'Доставка по РФ'
    };

    function initApp() {
      const listContainer = document.getElementById('reminders-list');
      const emptyMessage = document.getElementById('empty-message');
      const countLabel = document.getElementById('reminders-count');
      const refreshBtn = document.getElementById('refresh-reminders');
      const recommendationsBlock = document.getElementById('recommendations-block');

      loadReminders();
      loadRecommendations();

      refreshBtn.addEventListener('click', async () => {
        const icon = refreshBtn.querySelector('svg');
        if (icon) icon.classList.add('animate-spin');
        await Promise.all([loadReminders(), loadRecommendations()]);
        const liveIcon = refreshBtn.querySelector('svg');
        if (liveIcon) liveIcon.classList.remove('animate-spin');
      });

      // Загружает и рисует список напоминаний
      async function loadReminders() {
        listContainer.innerHTML = '<div class="p-6 text-center text-sm text-gray-400">Загрузка...</div>';
        try {
          const reminders = await callServer('getReminders');
          render(reminders);
        } catch (error) {
          listContainer.innerHTML = `<div class="p-6 text-center text-sm text-red-500">Ошибка загрузки: ${error.message}</div>`;
        }
      }

      // Загружает и рисует блок рекомендаций по индивидуальной отправке
      async function loadRecommendations() {
        try {
          const recs = await callServer('getShippingRecommendations');
          if (recs.length === 0) {
            recommendationsBlock.classList.add('hidden');
            return;
          }
          recommendationsBlock.innerHTML = `
            <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4">
              <div class="text-sm font-semibold text-amber-800 mb-2">💡 Кандидаты на индивидуальную отправку</div>
              ${recs.map(r => `<div class="text-xs text-amber-700 py-0.5">${escapeHtmlClient(r.clientDisplay)} — ${r.count} посылок к посреднику КЗ</div>`).join('')}
            </div>
          `;
          recommendationsBlock.classList.remove('hidden');
        } catch (error) {
          recommendationsBlock.classList.add('hidden');
        }
      }

      // Определяет цвет карточки по давности (простая эвристика, без новой бизнес-логики)
      function getAgeColorClass(sinceMs) {
        if (!sinceMs) return 'border-gray-200';
        const daysOld = (Date.now() - sinceMs) / (1000 * 60 * 60 * 24);
        if (daysOld >= 3) return 'border-red-300 bg-red-50';
        if (daysOld >= 1) return 'border-amber-300 bg-amber-50';
        return 'border-gray-200';
      }

      function render(reminders) {
        countLabel.textContent = `Найдено: ${reminders.length}`;
        listContainer.innerHTML = '';

        if (reminders.length === 0) {
          emptyMessage.classList.remove('hidden');
          return;
        }
        emptyMessage.classList.add('hidden');

        reminders.forEach(r => listContainer.appendChild(buildCard(r)));
      }

      function buildCard(r) {
        const card = document.createElement('div');
        card.className = `bg-white rounded-2xl shadow-sm border p-4 mb-3 ${getAgeColorClass(r.sinceMs)}`;

        card.innerHTML = `
          <div class="flex items-start justify-between gap-2 cursor-pointer" data-open>
            <div>
              <div class="text-[11px] font-medium text-indigo-600 mb-0.5">Условие ${r.condition} — ${CONDITION_LABELS[r.condition]}</div>
              <div class="font-semibold text-gray-900 text-[15px]">${escapeHtmlClient(r.productDisplay)}</div>
              <div class="text-[13px] text-gray-500 mt-0.5">${escapeHtmlClient(r.clientDisplay || 'Клиент не привязан')}</div>
              <div class="text-[12px] text-gray-600 mt-1">Не заполнено: ${escapeHtmlClient(r.fieldLabel)}</div>
            </div>
          </div>
          ${r.canSnooze ? `<button type="button" class="snooze-btn mt-3 w-full py-2 rounded-xl border border-gray-200 text-xs font-medium text-gray-600">Отложить на ${CONFIG_SNOOZE_DAYS_LABEL}</button>` : ''}
        `;

        card.querySelector('[data-open]').addEventListener('click', () => {
          window.location.href = `edit-order.html?orderId=${encodeURIComponent(r.orderId)}`;
        });

        const snoozeBtn = card.querySelector('.snooze-btn');
        if (snoozeBtn) {
          snoozeBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            snoozeBtn.disabled = true;
            snoozeBtn.textContent = 'Откладываю...';
            try {
              await callServer('snoozeReminder', r.orderId);
              card.remove();
            } catch (error) {
              snoozeBtn.disabled = false;
              snoozeBtn.textContent = 'Ошибка, повторить';
            }
          });
        }

        return card;
      }
    }

    // Подпись на кнопке "Отложить" — текст фиксированный, серверный шаг менять здесь не нужно
    const CONFIG_SNOOZE_DAYS_LABEL = '3 дня';
  </script>
</body>

</html>
