<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Заказы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="common.js"></script>
  <style>
    body {
      background-color: #f3f4f9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 80px;
    }
  </style>
</head>

<body class="text-gray-800">
  <div id="loading-screen" class="fixed inset-0 bg-[#f3f4f9] flex items-center justify-center z-50">
    <div class="text-gray-400 text-sm">Загрузка...</div>
  </div>

  <div id="access-denied-screen" class="fixed inset-0 bg-[#f3f4f9] hidden items-center justify-center z-50 px-6">
    <div class="text-center" style="font-family: monospace; font-size: 12px; word-break: break-all; text-align: left;">
      <p><b>Доступ не подтверждён.</b></p>
      <p id="debug-tg-exists"></p>
      <p id="debug-init-data"></p>
    </div>
  </div>

  <div id="app-content" class="hidden">
    <header class="fixed top-0 left-0 right-0 h-14 bg-[#f3f4f9] bg-opacity-90 backdrop-blur-md z-40 flex items-center justify-between px-4">
      <a href="index.html" class="p-2 text-indigo-600 rounded-full hover:bg-white/50 transition-colors">
        <i data-lucide="arrow-left" class="w-6 h-6"></i>
      </a>
      <h1 class="text-lg font-semibold text-gray-900 tracking-tight">Заказы</h1>
      <button id="refresh-orders" class="p-2 text-indigo-600 rounded-full hover:bg-white/50 transition-colors">
        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
      </button>
    </header>

    <main class="pt-16 pb-6 px-4 md:px-0 max-w-2xl mx-auto">

      <!-- Поиск -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-3 mb-3 flex items-center gap-2">
        <i data-lucide="search" class="w-4 h-4 text-gray-400 shrink-0"></i>
        <input type="text" id="order-search" class="w-full bg-transparent border-none outline-none text-[15px] placeholder-gray-400" placeholder="Поиск по заказам..." autocomplete="off">
      </div>

      <!-- Сортировка -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-3 mb-3 flex items-center gap-2">
        <select id="sort-field" class="flex-1 bg-transparent border-none outline-none text-[14px] cursor-pointer">
          <option value="dateOrderSort">Дата выкупа</option>
          <option value="productDisplay">Выпуск</option>
          <option value="statusOrder">Статус заказа</option>
          <option value="statusDelivery">Статус доставки</option>
          <option value="purchaseChannel">Канал выкупа</option>
          <option value="clientDisplay">Клиент</option>
        </select>
        <button id="sort-direction" class="p-1.5 text-indigo-600">
          <i data-lucide="arrow-down-wide-narrow" class="w-4 h-4"></i>
        </button>
      </div>

      <div class="text-[11px] text-gray-400 px-1 mb-2" id="orders-count"></div>

      <!-- Список -->
      <div id="orders-list"></div>

      <div id="empty-message" class="hidden text-center text-sm text-gray-400 py-10">Заказы не найдены</div>

      <button id="load-more-btn" class="hidden w-full bg-white border border-gray-100 rounded-2xl py-3 text-sm font-medium text-indigo-600 shadow-sm">
        Показать ещё
      </button>

    </main>

    <!-- Нижняя навигация -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 pb-safe pt-1 px-1 flex justify-between items-end z-40 h-[70px] shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
      <a href="#" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="home" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Главная</span>
      </a>
      <a href="orders.html" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-indigo-600 pb-2 h-full">
        <i data-lucide="list" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Заказы</span>
      </a>
      <a href="catalog.html" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="layers" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Каталог</span>
      </a>
      <div class="flex-1 relative h-full flex flex-col items-center justify-end pb-2">
        <a href="index.html" class="absolute -top-5 bg-indigo-600 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-lg shadow-indigo-600/30 hover:scale-105 transition-transform">
          <i data-lucide="plus" class="w-6 h-6"></i>
        </a>
        <span class="text-[10px] font-medium text-indigo-600 leading-none mt-auto">Новый заказ</span>
      </div>
      <a href="#" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="bell" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Напоминания</span>
      </a>
      <a href="#" class="flex-1 flex flex-col items-center justify-end gap-1.5 text-gray-400 hover:text-indigo-600 transition-colors pb-2 h-full">
        <i data-lucide="user-circle" class="w-[22px] h-[22px]"></i>
        <span class="text-[10px] font-medium leading-none">Профиль</span>
      </a>
    </nav>
  </div>

  <script>
    lucide.createIcons();
    initAccessCheck(initApp);

    /**
     * @param {Object} dictionaries Справочники (пока не используются на этом экране,
     *        но initAccessCheck их всегда даёт — берём, чтобы не плодить второй вызов)
     */
    function initApp(dictionaries) {
      const PAGE_SIZE = 50;
      let allOrders = [];
      let displayCount = PAGE_SIZE;
      let sortDirection = 'desc'; // По умолчанию: новые сверху

      const listContainer = document.getElementById('orders-list');
      const emptyMessage = document.getElementById('empty-message');
      const loadMoreBtn = document.getElementById('load-more-btn');
      const searchInput = document.getElementById('order-search');
      const sortField = document.getElementById('sort-field');
      const sortDirBtn = document.getElementById('sort-direction');
      const refreshBtn = document.getElementById('refresh-orders');
      const countLabel = document.getElementById('orders-count');

      // 1. Первая загрузка списка (из кэша сервера — один вызов на всю сессию страницы)
      loadOrders();

      async function loadOrders() {
        listContainer.innerHTML = '<div class="p-6 text-center text-sm text-gray-400">Загрузка заказов...</div>';
        try {
          allOrders = await callServer('getOrdersList');
          displayCount = PAGE_SIZE;
          render();
        } catch (error) {
          listContainer.innerHTML = `<div class="p-6 text-center text-sm text-red-500">Ошибка загрузки: ${error.message}</div>`;
        }
      }

      // 2. Ручное обновление — сбрасывает кэш на сервере, тянет свежие данные с листа
      refreshBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        const icon = refreshBtn.querySelector('svg');
        if (icon) icon.classList.add('animate-spin');

        try {
          allOrders = await callServer('refreshOrdersList');
          displayCount = PAGE_SIZE;
          render();
        } catch (error) {
          alert('Не удалось обновить список: ' + error.message);
        } finally {
          // Ищем элемент ЗАНОВО, а не переиспользуем ссылку icon — если где-то
          // между кликом и этим моментом сработал lucide.createIcons(), DOM-узел
          // мог быть физически подменён (см. комментарий выше про Lucide).
          const liveIcon = refreshBtn.querySelector('svg');
          if (liveIcon) liveIcon.classList.remove('animate-spin');
        }
      });

      // 3. Поиск — общий по всем отображаемым полям, целиком на клиенте (без запроса к серверу)
      const handleSearch = debounce(() => { displayCount = PAGE_SIZE; render(); }, 250);
      searchInput.addEventListener('input', handleSearch);

      // 4. Сортировка — тоже целиком на клиенте (список уже загружен целиком)
      sortField.addEventListener('change', () => { displayCount = PAGE_SIZE; render(); });
      sortDirBtn.addEventListener('click', () => {
        sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
        // Пересоздаём содержимое кнопки заново, а не ищем старый <i> — lucide.createIcons()
        // необратимо заменяет <i> на <svg> при первой отрисовке, повторный querySelector('i')
        // после этого всегда возвращает null.
        sortDirBtn.innerHTML = `<i data-lucide="${sortDirection === 'desc' ? 'arrow-down-wide-narrow' : 'arrow-up-narrow-wide'}" class="w-4 h-4"></i>`;
        lucide.createIcons();
        render();
      });

      // 5. Подгрузка следующей "страницы" карточек
      loadMoreBtn.addEventListener('click', () => { displayCount += PAGE_SIZE; render(); });

      /**
       * Применяет поиск + сортировку к уже загруженному массиву и отрисовывает
       * первые displayCount карточек.
       */
      function render() {
        const query = searchInput.value.trim().toLowerCase();

        let filtered = allOrders;
        if (query !== '') {
          filtered = allOrders.filter(o => {
            const haystack = `${o.productDisplay} ${o.productOriginal} ${o.searchTags} ${o.statusOrder} ${o.statusDelivery} ${o.purchaseChannel} ${o.clientDisplay} ${o.orderId}`.toLowerCase();
            return haystack.includes(query);
          });
        }

        const field = sortField.value;
        const sorted = filtered.slice().sort((a, b) => {
          let result;
          if (field === 'dateOrderSort') {
            result = a.dateOrderSort - b.dateOrderSort;
          } else {
            result = (a[field] || '').localeCompare(b[field] || '', 'ru');
          }
          return sortDirection === 'desc' ? -result : result;
        });

        countLabel.textContent = `Найдено: ${sorted.length}`;

        const toShow = sorted.slice(0, displayCount);
        listContainer.innerHTML = '';

        if (toShow.length === 0) {
          emptyMessage.classList.remove('hidden');
        } else {
          emptyMessage.classList.add('hidden');
          toShow.forEach(o => listContainer.appendChild(buildCard(o)));
        }

        loadMoreBtn.classList.toggle('hidden', displayCount >= sorted.length);
      }

      // Карточка заказа — клик открывает форму редактирования с этим orderId в URL
      function buildCard(o) {
        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl shadow-sm border border-gray-100 p-4 mb-3 cursor-pointer active:bg-gray-50 transition-colors';
        card.addEventListener('click', () => {
          window.location.href = `edit-order.html?orderId=${encodeURIComponent(o.orderId)}`;
        });
        card.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <div>
              <div class="font-semibold text-gray-900 text-[15px]">${escapeHtmlClient(o.productDisplay)}</div>
              ${o.productOriginal && o.productOriginal !== o.productDisplay ? `<div class="text-[12px] text-gray-400 mt-0.5">${escapeHtmlClient(o.productOriginal)}</div>` : ''}
            </div>
            <div class="text-[11px] text-gray-400 shrink-0">${escapeHtmlClient(o.dateOrderDisplay)}</div>
          </div>
          <div class="flex flex-wrap gap-1.5 mt-2">
            ${o.statusOrder ? `<span class="text-[11px] px-2 py-0.5 rounded-full bg-green-100 text-green-700">${escapeHtmlClient(o.statusOrder)}</span>` : ''}
            ${o.statusDelivery ? `<span class="text-[11px] px-2 py-0.5 rounded-full bg-cyan-100 text-cyan-700">${escapeHtmlClient(o.statusDelivery)}</span>` : ''}
            ${o.purchaseChannel ? `<span class="text-[11px] px-2 py-0.5 rounded-full bg-pink-100 text-pink-700">${escapeHtmlClient(o.purchaseChannel)}</span>` : ''}
          </div>
          <div class="text-[13px] text-gray-500 mt-2">${escapeHtmlClient(o.clientDisplay || 'Клиент не привязан')}</div>
        `;
        return card;
      }

      // Минимальная защита от разметки в данных таблицы (имя клиента и т.п.)
      function escapeHtmlClient(text) {
        if (!text) return '';
        return text.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
    }
  </script>
</body>

</html>
